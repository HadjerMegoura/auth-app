<div class="min-h-screen bg-gray-50">

  <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">

      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-full bg-purple-100 flex items-center justify-center">
          <svg class="w-4 h-4 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M16 11V7a4 4 0 00-8 0v4M5 11h14l-1 10H6L5 11z"/>
          </svg>
        </div>
        <span class="font-medium text-gray-900">ShopApp</span>
      </div>

      <button (click)="logout()"
        class="flex items-center gap-2 text-sm text-gray-600 hover:text-purple-600 border border-gray-300 hover:border-purple-300 rounded-lg px-3 py-1.5 transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Logout
      </button>

    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-8">

    <div class="mb-6">
      <h1 class="text-xl font-medium text-gray-900">Our products</h1>
      <p class="text-sm text-gray-500">Browse our latest collection</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
      <div *ngFor="let product of products"
        class="bg-white border border-gray-200 rounded-2xl overflow-hidden hover:shadow-sm transition">

        <img [src]="product.image" [alt]="product.name" class="w-full h-44 object-cover" />

        <div class="p-4">
          <span class="text-xs text-purple-600 bg-purple-50 px-2 py-0.5 rounded-md font-medium">
            {{ product.category }}
          </span>
          <h3 class="text-sm font-medium text-gray-900 mt-2">{{ product.name }}</h3>
          <div class="flex justify-between items-center mt-3">
            <span class="text-base font-medium text-gray-900">{{ product.price | currency }}</span>
            <button class="text-xs bg-purple-600 hover:bg-purple-700 text-white font-medium px-3 py-1.5 rounded-lg transition">
              Add to cart
            </button>
          </div>
        </div>

      </div>
    </div>

  </main>

</div>
